<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AIF Mobile</title>

<style>

body{
margin:0;
background:#05080d;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; }

.logo{
font-size:42px;
font-weight:700;
color:#00ff9c;
}

.sub{
margin-top:6px;
opacity:0.8;
}

.bar{
width:220px;
height:6px;
background:#1a1a1a;
border-radius:10px;
margin-top:30px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#00ff9c;
animation:load 2s forwards;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
}

.quote{
margin-top:25px;
opacity:0.7;
font-size:14px;
}

</style>

</head>


<body>

<div class="logo">AIF™</div>

<div class="sub">Artificial Intelligence Fishing</div>

<div class="bar">
<div class="fill"></div>
</div>

<div class="quote">Intelligent Fishing</div>


<script>

setTimeout(function(){

window.location.href="Final V9.html";

},2000);

</script>


</body>

</html>
