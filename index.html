
<!DOCTYPE html>
<html>
<head> 
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Dashboard v4</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{margin:0;background:#05080d;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;color:#e6edf3;display:flex;justify-content:center;}
.main{width:100%;max-width:420px;padding-bottom:120px;}
.header{text-align:center;margin-top:18px;}
.brand{font-size:36px;font-weight:700;color:#00ff9c;}
.subtitle1{font-size:20px;color:#b9c3cc;}
.subtitle2{font-size:15px;color:#7fffb2;}
.instrument{margin-top:18px;margin-bottom:6px;display:flex;justify-content:center;}
.spi-container{position:relative;width:260px;height:260px;display:flex;justify-content:center;align-items:center;overflow:hidden;}
#spiGauge{width:260px;height:260px;position:relative;z-index:2;filter:drop-shadow(0 0 12px rgba(0,255,156,0.25));transition:filter .4s ease;}
.spi-number{font-size:46px;fill:white;font-weight:700;}
.spi-label{font-size:18px;fill:#7fffb2;}
.spi-desc{font-size:13px;fill:#9aa4ad;}
.tile i{width:28px;height:28px;stroke:#00ffa6;stroke-width:1.5;margin-bottom:6px;}
.tile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px;}
.tile{background:rgba(15,20,28,0.75);border-radius:12px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(10px);box-shadow:0 0 18px rgba(0,255,160,0.18),inset 0 0 10px rgba(255,255,255,0.05);}
.tile-title{font-size:12px;color:#9aa4ad;}
.tile-value{font-size:18px;margin-top:2px;}
.tactical-bar{margin:10px 20px 14px 20px;padding:12px;border-radius:14px;border:1px solid #00ff9c;background:linear-gradient(180deg, rgba(0,255,156,0.06), rgba(0,255,156,0.04));text-align:center;font-size:14px;font-weight:500;color:#bfffe3;box-shadow:0 6px 18px rgba(0,0,0,0.35);}
.ai-box{margin:20px;background:rgba(15,20,28,0.75);border-radius:14px;padding:16px;border-left:4px solid #00ff9c;cursor:pointer;}
.ai-content{max-height:90px;overflow:hidden;}
.ai-content.expanded{max-height:500px;}
.dock{position:fixed;bottom:0;width:100%;max-width:420px;background:black;display:flex;justify-content:space-evenly;padding:10px 0;border-top:1px solid rgba(255,255,255,0.1);}
.dock-btn{text-align:center;font-size:11px;width:16%;cursor:pointer;}
.dock-btn span{font-size:20px;display:block;}
</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="subtitle1">Artificial Intelligence Fishing</div>
<div class="subtitle2">Drop • Scan • Strike</div>
</div>

<div class="instrument">
<div class="spi-container">
<svg id="spiGauge" viewBox="0 0 300 300">

<defs>
<linearGradient id="spiGrad">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="50%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="110"
stroke="#1c2b2b"
stroke-width="14"
fill="none"
stroke-dasharray="8 12"/>

<circle id="spiArc"
cx="150"
cy="150"
r="110"
stroke="url(#spiGrad)"
stroke-width="14"
fill="none"
stroke-linecap="round"
transform="rotate(-90 150 150)"/>

<text x="150" y="145" text-anchor="middle"
class="spi-number"
id="spiValue">--%</text>

<text x="150" y="175"
text-anchor="middle"
class="spi-label">SPI</text>

<text x="150" y="195"
text-anchor="middle"
class="spi-desc">Strike Probability Index</text>

</svg>
</div>
</div>

<div class="tactical-bar" id="tactical">
Waiting for environmental data...
</div>

<div class="tile-grid">

<div class="tile"><i data-lucide="sun"></i><div class="tile-title">air</div><div class="tile-value" id="air">--</div></div>
<div class="tile"><i data-lucide="waves"></i><div class="tile-title">Surface</div><div class="tile-value" id="surface">--</div></div>
<div class="tile"><i data-lucide="arrow-down"></i><div class="tile-title">Bottom</div><div class="tile-value" id="bottom">--</div></div>

<div class="tile"><i data-lucide="gauge"></i><div class="tile-title">Pressure</div><div class="tile-value" id="pressure">--</div></div>
<div class="tile"><i data-lucide="wind"></i><div class="tile-title">Wind</div><div class="tile-value" id="wind">--</div></div>
<div class="tile"><i data-lucide="cloud"></i><div class="tile-title">Cloud</div><div class="tile-value" id="cloud">--</div></div>

<div class="tile"><i data-lucide="moon"></i><div class="tile-title">Moon</div><div class="tile-value" id="moon">--</div></div>
<div class="tile"><i data-lucide="leaf"></i><div class="tile-title">Season</div><div class="tile-value" id="season">--</div></div>
<div class="tile"><i data-lucide="fish"></i><div class="tile-title">Feed</div><div class="tile-value" id="feed">--</div></div>

</div>

<div class="dock">
<div class="dock-btn" onclick="refreshDashboard()"><span>⟳</span>Refresh</div>
</div>

</div>

<script>

const API_KEY="63ba514dc7c2242cb10cd2632d2569ad"

let pressureHistory=[]

function moonPhase(){
let d=new Date()
let lp=2551443
let now=d.getTime()/1000
let new_moon=592500
let phase=((now-new_moon)%lp)/lp
if(phase<0.25)return "Waxing"
if(phase<0.5)return "Full"
if(phase<0.75)return "Waning"
return "New"
}

function sunriseWindow(){
let h=new Date().getHours()
if(h>=5 && h<=9)return 10
if(h>=17 && h<=20)return 12
return 0
}

function seasonalMetabolism(){
let m=new Date().getMonth()+1
if(m<=2||m==12)return 8
if(m<=5)return 4
if(m<=8)return -4
return 6
}

async function fetchWeather(){

let r = await fetch("https://api.openweathermap.org/data/2.5/weather?lat=-26.2&lon=28.0&units=metric&appid=" + API_KEY);
let d = await r.json();

render(d)

}

function calculateSPI(t,p,w,c,windDir){

let score=40

let trend=getPressureTrend(p)

if(trend==="rising")score+=18
if(trend==="stable")score+=10
if(trend==="falling")score-=8

if(w>=4 && w<=15)score+=15
if(w>18)score-=5

if(c>=20 && c<=70)score+=10

score+=sunriseWindow()
score+=seasonalMetabolism()

if(t>=16 && t<=24)score+=8

if(windDir>90 && windDir<180)score+=4

return Math.max(15,Math.min(score,95))

}

function getPressureTrend(p){

pressureHistory.push(p)

if(pressureHistory.length>6){
pressureHistory.shift()
}

if(pressureHistory.length<2){
return "stable"
}

let diff=pressureHistory[pressureHistory.length-1]-pressureHistory[0]

if(diff>1)return "rising"
if(diff<-1)return "falling"
return "stable"

}

function render(d){

let t=d.main.temp
let p=d.main.pressure
let w=d.wind.speed*3.6
let c=d.clouds.all
let windDir=d.wind.deg

let spi=calculateSPI(t,p,w,c,windDir)

updateSPI(spi)

let gauge=document.getElementById("spiGauge")

if(spi>=70){
gauge.style.filter="drop-shadow(0 0 25px rgba(0,255,156,0.9))"
}else{
gauge.style.filter="drop-shadow(0 0 12px rgba(0,255,156,0.25))"
}

document.getElementById("air").innerText=t.toFixed(1)+"°C"
document.getElementById("surface").innerText=(t-0.5).toFixed(1)+"°C"
document.getElementById("bottom").innerText=(t-1.5).toFixed(1)+"°C"
document.getElementById("pressure").innerText=p+" hPa"
document.getElementById("wind").innerText=w.toFixed(1)+" km/h"
document.getElementById("cloud").innerText=c+"%"
document.getElementById("moon").innerText=moonPhase()

document.getElementById("tactical").innerText="SPI "+spi+"% • Wind "+w.toFixed(0)+"km/h"

}

function updateSPI(v){

let c=document.getElementById("spiArc")
let r=110
let C=2*Math.PI*r

c.style.strokeDasharray=C
c.style.strokeDashoffset=C-(v/100)*C

document.getElementById("spiValue").textContent=v+"%"

}

document.addEventListener("DOMContentLoaded",function(){

fetchWeather()
setInterval(fetchWeather,600000)

})

lucide.createIcons()

</script>

</body>
</html>
