<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AIF Tactical Cockpit</title>

<link rel="stylesheet" href="css/cockpit.css">

</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="subtitle1">Artificial Intelligence Fishing</div> <div class="subtitle2">Drop • Scan • Strike</div> </div>

<!-- SPI Gauge -->

<div class="gauge">

<div class="gauge-title">SPI</div>

<svg viewBox="0 0 300 150">

<path
d="M20 140 A130 130 0 0 1 280 140"
stroke="#00ff9c"
stroke-width="18"
fill="none"
stroke-linecap="round"
/>

</svg>

<div id="spi" class="gauge-value">--%</div>

</div>

<!-- Radar -->

<div class="radar">

<img src="assets/lake-atmosphere.jpg" class="radar-water">

<div class="radar-circle"></div>

<div class="radar-line"></div>

</div>

<!-- CONF Gauge -->

<div class="gauge">

<div class="gauge-title">CONF</div>

<svg viewBox="0 0 300 150">

<path
d="M20 140 A130 130 0 0 1 280 140"
stroke="#3aa6ff"
stroke-width="18"
fill="none"
stroke-linecap="round"
/>

</svg>

<div id="confidenceText" class="gauge-value">CONF --</div>

</div>

<!-- Environmental Panels -->

<div class="panels">

<div class="panel">
<div class="panelTitle">Air</div>
<div id="air" class="panelValue">--</div> </div>

<div class="panel">
<div class="panelTitle">Pressure</div>
<div id="pressure" class="panelValue">--</div> </div>

<div class="panel">
<div class="panelTitle">Wind</div>
<div id="wind" class="panelValue">--</div> </div>

<div class="panel">
<div class="panelTitle">Cloud</div>
<div id="cloud" class="panelValue">--</div> </div>

</div>

</div>

<!-- Dock -->

<div class="dock">

<div class="dock-btn">📍<span>Scout</span></div>

<div class="dock-btn">⟳<span>Refresh</span></div>

<div class="dock-btn">🎯<span>Drop</span></div>

<div class="dock-btn">🐟<span>Map</span></div>

<div class="dock-btn">⚙<span>Setup</span></div>

<div class="dock-btn">📊<span>Report</span></div>

</div>

<!-- Scripts -->

<script src="js/environment.js"></script> <script src="js/radar.js"></script> <script src="js/map.js"></script> <script src="js/app.js"></script>

</body>
</html>
