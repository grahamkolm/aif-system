
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Radar V6</title>

<style>
body{
margin:0;
background:#05080d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#e6edf3;
display:flex;
justify-content:center;
}

.main{
width:100%;
max-width:430px;
padding-bottom:160px;
}

.header{
text-align:center;
margin-top:22px;
}

.brand{
font-size:36px;
font-weight:700;
color:#00ff9c;
}

.sub{
font-size:14px;
color:#ffffff;
opacity:.9;
}

.wrapper{
display:flex;
justify-content:center;
margin-top:18px;
}

.spi-value{
font-size:46px;
fill:white;
font-weight:600;
}

.spi-label{
font-size:12px;
fill:#cfd6dc;
}

.depth-label{
font-size:12px;
fill:#00ff9c;
}

.structure-label{
font-size:12px;
fill:#ffc400;
}

.wind-label{
font-size:12px;
fill:#8ecbff;
}

.tiles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
padding:0 12px;
margin-top:20px;
}

.tile{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:14px;
}

.tiles .tile:last-child{
grid-column:2;
}

.tile-title{
font-size:12px;
opacity:.8;
}

.tile-value{
font-size:20px;
margin-top:4px;
}

.ai-box{
margin:22px 12px;
background:rgba(255,255,255,.06);
border-left:4px solid #00ff9c;
border-radius:16px;
padding:18px;
cursor:pointer;
}

.ai-head{
font-size:20px;
margin-top:4px;
}

.ai-text{
margin-top:10px;
font-size:15px;
display:none;
line-height:1.6em;
}

.dock{
position:fixed;
bottom:55px;
width:100%;
max-width:430px;
background:#000;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid rgba(255,255,255,.1);
}

.dock-btn{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
}

.dock-btn span{
font-size:22px;
margin-bottom:4px;
}
</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="sub">Artificial Intelligence Fishing</div>
<div class="sub">See what lies below</div>
</div>

<div class="wrapper">

<svg viewBox="0 0 300 300" width="260">

<defs>
<linearGradient id="gradFull">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="40%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="120" fill="none" stroke="url(#gradFull)" stroke-width="4"/>

<g id="ticks"></g>

<circle cx="150" cy="150" r="102"
fill="none"
stroke="url(#gradFull)"
stroke-width="3"
stroke-linecap="round"
stroke-dasharray="640"
stroke-dashoffset="640"
transform="rotate(-90 150 150)"
id="progressArc"/>

<circle cx="150" cy="150" r="80" fill="#0b1117"/>

<text x="150" y="125" text-anchor="middle" class="spi-value" id="spiText">--%</text>
<text x="150" y="150" text-anchor="middle" class="spi-label">STRIKE</text>
<text x="150" y="170" text-anchor="middle" class="depth-label" id="depthTarget">Depth --</text>
<text x="150" y="190" text-anchor="middle" class="structure-label" id="structureType">Structure --</text>
<text x="150" y="210" text-anchor="middle" class="wind-label" id="windZone">Wind zone --</text>

</svg>

</div>

<div class="tiles">

<div class="tile">
<div class="tile-title">🌡 Air</div>
<div class="tile-value" id="airTemp"></div>
</div>

<div class="tile">
<div class="tile-title">🌊 Surface</div>
<div class="tile-value" id="surfaceTemp"></div>
</div>

<div class="tile">
<div class="tile-title">🔻 Bottom</div>
<div class="tile-value" id="bottomTemp"></div>
</div>

<div class="tile">
<div class="tile-title">🧭 Pressure</div>
<div class="tile-value" id="pressure"></div>
</div>

<div class="tile">
<div class="tile-title">💨 Wind</div>
<div class="tile-value" id="wind"></div>
</div>

<div class="tile">
<div class="tile-title">☁ Cloud</div>
<div class="tile-value" id="cloud"></div>
</div>

<div class="tile">
<div class="tile-title">🌙 Moon</div>
<div class="tile-value" id="moon"></div>
</div>

</div>

<div class="ai-box" onclick="toggleAI()">
<div class="ai-head">AIF Tactical Assessment</div>
<div class="ai-text" id="aiText"></div>
</div>

</div>

<div class="dock">

<div class="dock-btn" onclick="gps()">
<span>📍</span>
GPS
</div>

<div class="dock-btn" onclick="updateData()">
<span>🎣</span>
Refresh
</div>

<div class="dock-btn" onclick="drop()">
<span>🎯</span>
Drop
</div>

</div>

<script>

let dropHistory = [];

const ticks=document.getElementById("ticks");

for(let i=0;i<100;i++){

let angle=(i/100)*360;
let rad=(angle-90)*Math.PI/180;

let outer=112;
let inner=i%10===0?105:108;

let x1=150+outer*Math.cos(rad);
let y1=150+outer*Math.sin(rad);

let x2=150+inner*Math.cos(rad);
let y2=150+inner*Math.sin(rad);

let line=document.createElementNS("http://www.w3.org/2000/svg","line");

line.setAttribute("x1",x1);
line.setAttribute("y1",y1);
line.setAttribute("x2",x2);
line.setAttribute("y2",y2);
line.setAttribute("stroke","#fff");
line.setAttribute("stroke-width","1");

ticks.appendChild(line);

}

function fetchData(){

return{

airTemp:18+Math.random()*6,
surfaceTemp:19+Math.random()*5,
bottomTemp:16+Math.random()*4,
pressure:1012+Math.random()*6,
windSpeed:5+Math.random()*15,
windDir:["N","NE","E","SE","S","SW","W","NW"][Math.floor(Math.random()*8)],
cloud:Math.floor(Math.random()*100),
moon:["New","Waxing","Full","Waning"][Math.floor(Math.random()*4)]

};

}

function calculateStrike(d){

let score=50;

if(d.pressure>1015)score+=15;
if(d.windSpeed>=3 && d.windSpeed<=12)score+=15;
if(d.cloud>50)score+=10;
if(d.moon=="Full")score+=10;

return Math.min(100,Math.round(score));

}

function calculateDepth(d){

let diff=d.surfaceTemp-d.bottomTemp;

if(diff>4) return (6+Math.random()*2);
if(diff>2) return (5+Math.random()*2);
return (4+Math.random()*3);

}

function detectStructure(depth){

if(depth>9) return "Deep Basin";
if(depth>7) return "Feeding Band";
if(depth>5) return "Slope Edge";
return "Plateau";

}

function windFeedingZone(dir){

const zones={
"N":"South sector",
"NE":"South-West sector",
"E":"West sector",
"SE":"North-West sector",
"S":"North sector",
"SW":"North-East sector",
"W":"East sector",
"NW":"South-East sector"
};

return zones[dir];

}

function render(d){

document.getElementById("airTemp").innerText=d.airTemp.toFixed(1)+"°C";
document.getElementById("surfaceTemp").innerText=d.surfaceTemp.toFixed(1)+"°C";
document.getElementById("bottomTemp").innerText=d.bottomTemp.toFixed(1)+"°C";
document.getElementById("pressure").innerText=d.pressure.toFixed(0)+" hPa";
document.getElementById("wind").innerText=d.windSpeed.toFixed(1)+" km/h "+d.windDir;
document.getElementById("cloud").innerText=d.cloud+"%";
document.getElementById("moon").innerText=d.moon;

let strike=calculateStrike(d);
let depth=calculateDepth(d);
let structure=detectStructure(depth);
let zone=windFeedingZone(d.windDir);

let targetDepth=(depth+1.5).toFixed(1);

let radius=102;
let circumference=2*Math.PI*radius;

document.getElementById("progressArc").style.strokeDashoffset=
circumference-(strike/100)*circumference;

document.getElementById("spiText").innerText=strike+"%";
document.getElementById("depthTarget").innerText="Depth "+targetDepth+"m";
document.getElementById("structureType").innerText=structure;
document.getElementById("windZone").innerText=zone;

let report=
"Wind "+d.windDir+" pushing natural food toward "+zone+".\n\n"+
"Structure detected: "+structure+".\n"+
"Structure depth approx "+depth.toFixed(1)+"m.\n"+
"Target drop depth "+targetDepth+"m (structure +1.5m).\n"+
"Pressure "+d.pressure.toFixed(0)+"hPa influencing carp behaviour.\n"+
"Cloud cover "+d.cloud+"% affecting feeding confidence.\n"+
"Moon phase "+d.moon+" influencing activity.\n\n"+
"Recommended Drop: "+zone+" feeding lane near "+targetDepth+"m depth.";

document.getElementById("aiText").innerHTML=report.replace(/\n/g,"<br>");

}

function updateData(){
render(fetchData());
}

function toggleAI(){
let box=document.getElementById("aiText");
box.style.display=box.style.display==="block"?"none":"block";
}

function gps(){
navigator.geolocation.getCurrentPosition(
pos=>alert("GPS: "+pos.coords.latitude+", "+pos.coords.longitude)
);
}

function drop(){
let time=new Date().toLocaleTimeString();
dropHistory.push(time);
alert("Drop saved at "+time+" (session memory)");
}

window.onload=function(){
updateData();
};

</script>

</body>
</html>
