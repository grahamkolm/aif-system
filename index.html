
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Tactical Dashboard</title>

<style>
body{margin:0;background:#05080d;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;color:#e6edf3;display:flex;justify-content:center;}
.main{width:100%;max-width:420px;padding-bottom:120px;}
.header{text-align:center;margin-top:20px;}
.brand{font-size:36px;font-weight:700;color:#00ff9c;letter-spacing:1px;text-shadow:0 0 10px rgba(0,255,156,0.6);}
.subtitle{font-size:18px;color:#7fffb2;}
.wrapper{margin-top:20px;display:flex;justify-content:center;}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px;}
.tile{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px;}
.tile-title{font-size:12px;opacity:0.8;}
.tile-value{font-size:18px;margin-top:4px;}
.ai-box{margin:18px;background:rgba(255,255,255,0.05);border-left:4px solid #00ff9c;border-radius:14px;padding:14px;cursor:pointer;}
.ai-extra{display:none;margin-top:10px;font-size:13px;color:#9fb4c7;line-height:1.6;}
.spi-value{font-size:44px;font-weight:700;fill:#fff;}
.spi-label{font-size:16px;fill:#00ff9c;letter-spacing:2px;}
.spi-small{font-size:13px;fill:#9fb4c7;}
.radarRing{stroke:rgba(0,255,156,0.18);stroke-width:1;fill:none;}
#sonarSweep{transform-origin:150px 150px;animation:spin 4s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.glow{filter:drop-shadow(0 0 8px rgba(0,255,156,0.7));}
</style>
</head>

<body>
<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="subtitle">Drop • Scan • Strike</div>
</div>

<div class="wrapper">

<svg viewBox="0 0 300 300" width="260">
<defs>
<linearGradient id="grad">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="40%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="120" fill="none" stroke="url(#grad)" stroke-width="4"/>
<circle id="progressArc" cx="150" cy="150" r="102" fill="none" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" transform="rotate(-90 150 150)" class="glow"/>

<circle cx="150" cy="150" r="40" class="radarRing"/>
<circle cx="150" cy="150" r="70" class="radarRing"/>
<circle cx="150" cy="150" r="100" class="radarRing"/>

<circle cx="150" cy="150" r="80" fill="#070c12"/>

<text x="150" y="140" text-anchor="middle" id="spiText" class="spi-value">--%</text>
<text x="150" y="165" text-anchor="middle" class="spi-label">STRIKE</text>

<text x="150" y="190" text-anchor="middle" class="spi-small" id="depthTxt"></text>
<text x="150" y="205" text-anchor="middle" class="spi-small" id="structureTxt"></text>
<text x="150" y="220" text-anchor="middle" class="spi-small" id="windTxt"></text>

<line id="sonarSweep" x1="150" y1="150" x2="150" y2="40" stroke="#00ff9c" stroke-width="2" stroke-linecap="round"/>
</svg>

</div>

<div class="tiles">
<div class="tile"><div class="tile-title">Air</div><div class="tile-value" id="airTemp"></div></div>
<div class="tile"><div class="tile-title">Surface</div><div class="tile-value" id="surfaceTemp"></div></div>
<div class="tile"><div class="tile-title">Bottom</div><div class="tile-value" id="bottomTemp"></div></div>

<div class="tile"><div class="tile-title">Pressure</div><div class="tile-value" id="pressure"></div></div>
<div class="tile"><div class="tile-title">Wind</div><div class="tile-value" id="wind"></div></div>
<div class="tile"><div class="tile-title">Cloud</div><div class="tile-value" id="cloud"></div></div>

<div class="tile"><div class="tile-title">Moon</div><div class="tile-value" id="moon"></div></div>
<div class="tile"><div class="tile-title">Season</div><div class="tile-value" id="season"></div></div>
<div class="tile"><div class="tile-title">Open</div><div class="tile-value" id="openTile"></div></div>
</div>

<div class="ai-box" onclick="toggleAI()">
<b>AIF Tactical Assessment</b>
<div id="aiMain"></div>
<div id="aiExtra" class="ai-extra"></div>
</div>

</div>

<script>
function moonPhase(){
const lp=2551443;
const now=new Date().getTime()/1000;
const new_moon=new Date(1970,0,7,20,35,0).getTime()/1000;
const phase=((now-new_moon)%lp)/lp;
if(phase<0.1) return "New";
if(phase<0.25) return "Waxing";
if(phase<0.55) return "Full";
if(phase<0.75) return "Waning";
return "New";
}

function feedingWindow(){
let h=new Date().getHours();
if(h<8) return "Morning Feed";
if(h<18) return "Day Patrol";
if(h<22) return "Evening Feed";
return "Night Feeding";
}

function season(){
let m=new Date().getMonth()+1;
if(m>=12||m<=2) return "Summer";
if(m<=5) return "Autumn";
if(m<=8) return "Winter";
return "Spring";
}

function strikeModel(d){
let score=50;
if(d.temp>18) score+=10;
if(d.wind<10) score+=10;
if(d.cloud>50) score+=10;
if(d.pressure>1016) score+=10;
if(d.moon==="Full") score+=10;
return Math.min(95,Math.max(20,Math.round(score)));
}

function toggleAI(){
let e=document.getElementById("aiExtra");
e.style.display=e.style.display==="block"?"none":"block";
}

async function fetchWeather(){
let r=await fetch("https://api.openweathermap.org/data/2.5/weather?lat=-26.2&lon=28.0&units=metric&appid=63ba514dc7c2242cb10cd2632d2569ad");
let j=await r.json();
return {temp:j.main.temp,pressure:j.main.pressure,cloud:j.clouds.all,wind:j.wind.speed,windDir:j.wind.deg};
}

function windDir(deg){
const dirs=["N","NE","E","SE","S","SW","W","NW"];
return dirs[Math.round(deg/45)%8];
}

function render(d){
document.getElementById("airTemp").innerText=d.temp+"°C";
document.getElementById("surfaceTemp").innerText=(d.temp-0.5).toFixed(1)+"°C";
document.getElementById("bottomTemp").innerText=(d.temp-1.5).toFixed(1)+"°C";
document.getElementById("pressure").innerText=d.pressure+" hPa";
document.getElementById("wind").innerText=d.wind+" km/h "+windDir(d.windDir);
document.getElementById("cloud").innerText=d.cloud+"%";
document.getElementById("moon").innerText=moonPhase();
document.getElementById("season").innerText=season();
document.getElementById("openTile").innerText=feedingWindow();

let spi=strikeModel({temp:d.temp,wind:d.wind,cloud:d.cloud,pressure:d.pressure,moon:moonPhase()});
document.getElementById("spiText").textContent=spi+"%";

const radius=102;
const circ=2*Math.PI*radius;
const arc=document.getElementById("progressArc");
arc.style.strokeDasharray=circ;
arc.style.strokeDashoffset=circ-(spi/100)*circ;

document.getElementById("depthTxt").textContent="Depth 6.5m";
document.getElementById("structureTxt").textContent="Slope Edge";
document.getElementById("windTxt").textContent="Wind "+windDir(d.windDir);

document.getElementById("aiMain").innerHTML="Next feeding: "+feedingWindow()+"<br>Wind "+windDir(d.windDir)+" pushing food lanes.";
document.getElementById("aiExtra").innerHTML="<b>Session Timeline</b><br>05:30 Dawn movement<br>07:00 Feeding window<br>12:00 Midday slow period<br>18:30 Evening feeding<br>23:00 Night patrol";
}

async function update(){let d=await fetchWeather();render(d);}
update();
</script>

</body>
</html>
