
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Tactical Dashboard V8</title>

<link rel="icon" type="image/png" href="aif-icon.png"> <link rel="apple-touch-icon" sizes="512x512" href="aif-icon.png"> <meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
margin:0;
background:#05080d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#e6edf3;
display:flex;
justify-content:center;
}

.main{
width:100%;
max-width:420px;
padding-bottom:140px;
}

.header{
text-align:center;
margin-top:22px;
}

.brand{
font-size:36px;
font-weight:700;
color:#00ff9c;
letter-spacing:1px;

text-shadow:
0 0 10px rgba(0,255,156,0.6),
0 0 20px rgba(0,255,156,0.35);
}

.subtitle1{
font-size:20px;
font-weight:500;
color:#b9c3cc;
margin-top:6px;
letter-spacing:0.5px;
}

.subtitle2{
font-size:16px;
color:#7fffb2;
margin-top:4px;
letter-spacing:1px;

text-shadow:
0 0 8px rgba(0,255,156,0.45),
0 0 18px rgba(0,255,156,0.25);
}

.sub{
font-size:20px;
opacity:0.75;
color:#cfd6dc;
letter-spacing:1px
}

.wrapper{
margin-top:20px;
display:flex;
justify-content:center;
}

#progressArc{
filter:
drop-shadow(0 0 6px rgba(0,255,156,0.6))
drop-shadow(0 0 16px rgba(0,255,156,0.35)); }
}

.tiles{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:14px;
margin-top:20px;
width:100%;
}

.tile{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:14px;
width:100%;
}

.tile-title{
font-size:12px;
opacity:0.7;
display:flex;
align-items:center;
gap:6px;
}

.tile-value{
font-size:20px;
font-weight:500;
margin-top:4px;
}

.ai-box{
margin:22px 12px;
background:rgba(255,255,255,0.06);
border-left:4px solid #00ff9c;
border-radius:16px;
padding:18px;
}

.ai-head{
font-size:22px;
font-weight:600;
margin-top:6px;
}

.ai-text{
margin-top:10px;
font-size:15px;
line-height:1.5em;
display:none;
}

.dock{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:#000;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid rgba(255,255,255,0.08);
}

.dock-btn{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
}

.dock-btn span{
font-size:22px;
margin-bottom:4px;
}

.spi-value{
font-size:48px;
font-weight:700;
fill:#ffffff;
filter: drop-shadow(0 0 6px rgba(0,255,156,0.4));
}

.spi-label{
font-size:16px;
letter-spacing:2px;
fill:#00ff9c;
}

.spi-small{
font-size:13px;
fill:#9fb4c7;
}

</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>

<div class="subtitle1">
Artificial Intelligence Fishing
</div>

<div class="subtitle2">
Drop • Scan • Analyze • Strike
</div>

<div class="wrapper">

<svg viewBox="0 0 300 300" width="260">

<defs>
<linearGradient id="gradFull">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="40%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="120"
fill="none"
stroke="url(#gradFull)"
stroke-width="4"/>

<circle cx="150" cy="150" r="102"
fill="none"
stroke="url(#gradFull)"
stroke-width="3"
stroke-linecap="round"
stroke-dasharray="640"
stroke-dashoffset="640"
transform="rotate(-90 150 150)"
id="progressArc"/>

<circle cx="150" cy="150" r="80" fill="#070c12"/>

<text x="150" y="140" text-anchor="middle" class="spi-value" id="spiText">--%</text>
<text x="150" y="165" text-anchor="middle" class="spi-label">STRIKE</text>

<text x="150" y="190" text-anchor="middle" class="spi-small" id="depthTxt">Depth --</text>
<text x="150" y="205" text-anchor="middle" class="spi-small" id="structureTxt">Structure --</text>
<text x="150" y="220" text-anchor="middle" class="spi-small" id="windTxt">Wind zone --</text>

</svg>
</div>

<div class="tiles">

<div class="tile">
<div class="tile-title">
<span id="airIcon"> 🌡</span> Air
</div>
<div class="tile-value" id="airTemp"></div>
</div>

<div class="tile">
<div class="tile-title">
<span id="surfaceIcon">🌊</span> Surface
</div>
<div class="tile-value" id="surfaceTemp"></div>
</div>

<div class="tile">
<div class="tile-title">
<span id="bottomIcon">🔻</span> Bottom
</div>
<div class="tile-value" id="bottomTemp"></div>
</div>

<div class="tile">
<div class="tile-title">🧭 Pressure</div>
<div class="tile-value" id="pressure"></div>
</div>

<div class="tile">
<div class="tile-title">💨 Wind</div>
<div class="tile-value" id="wind"></div>
</div>

<div class="tile">
<div class="tile-title">☁ Cloud</div>
<div class="tile-value" id="cloud"></div>
</div>

<div class="tile">
<div class="tile-title">🌙 Moon</div>
<div class="tile-value" id="moon"></div>
</div>

<div class="tile">
<div class="tile-title">🍂 Season</div>
<div class="tile-value" id="season"></div>
</div>

<div class="tile">
<div class="tile-title">🌍 Water</div>
<div class="tile-value" id="water"></div>
</div>

</div>

<div class="ai-box" onclick="toggleAI()">
<div class="ai-head">AIF Tactical Assessment</div>
<div class="ai-text" id="aiText"></div>
</div>

</div>

<div class="dock">
<div class="dock-btn"><span>📍</span>GPS</div>
<div class="dock-btn" onclick="updateData()"><span>🎣</span>Refresh</div>
<div class="dock-btn"><span>🎯</span>Drop</div>
</div>

<script>

function getSeason(){
const m = new Date().getMonth()+1;
if(m>=12||m<=2) return "Summer";
if(m>=3&&m<=5) return "Autumn";
if(m>=6&&m<=8) return "Winter";
return "Spring";
}

function calculateSPI(d){
let score = 50;
if(d.pressure > 1015) score += 10;
if(d.windSpeed >= 5 && d.windSpeed <= 18) score += 15;
if(d.cloud > 50) score += 10;
if(d.moon === "New") score += 10;
if(d.moon === "Full") score += 8;

let tempDiff = d.surfaceTemp - d.bottomTemp;
if(tempDiff > 3) score += 10;

return Math.min(100,Math.round(score));
}

function fetchData(){
return{
airTemp:18+Math.random()*5,
surfaceTemp:19+Math.random()*4,
bottomTemp:16+Math.random()*3,
pressure:1012+Math.random()*6,
windSpeed:5+Math.random()*12,
windDir:["N","NE","E","SE","S","SW","W","NW"][Math.floor(Math.random()*8)],
cloud:Math.floor(Math.random()*100),
moon:["New","Waxing","Full","Waning"][Math.floor(Math.random()*4)]
};
}

function render(d){

document.getElementById("airTemp").innerText=d.airTemp.toFixed(1)+"°C";
document.getElementById("surfaceTemp").innerText=d.surfaceTemp.toFixed(1)+"°C";
document.getElementById("bottomTemp").innerText=d.bottomTemp.toFixed(1)+"°C";
let airIcon = document.getElementById("airIcon");

//Air Colour logic

if(d.airTemp < 12){
airIcon.style.color = "#4da6ff";   // cold blue
}
else if(d.airTemp < 18){
airIcon.style.color = "#00ff88";   // green (good feeding)
}
else if(d.airTemp < 24){
airIcon.style.color = "#ffaa00";   // warm orange
}
else{
airIcon.style.color = "#ff4444";   // hot red
}

//Surface Colour Logic

let surfaceIcon = document.getElementById("surfaceIcon");

if(d.surfaceTemp < 12){
surfaceIcon.style.color = "#4da6ff";
}
else if(d.surfaceTemp < 20){
surfaceIcon.style.color = "#00ff88";
}
else if(d.surfaceTemp < 26){
surfaceIcon.style.color = "#ffaa00";
}
else{
surfaceIcon.style.color = "#ff4444";
}


document.getElementById("pressure").innerText=d.pressure.toFixed(0)+" hPa";
document.getElementById("wind").innerText=d.windSpeed.toFixed(1)+" km/h "+d.windDir;
document.getElementById("cloud").innerText=d.cloud+"%";
document.getElementById("moon").innerText=d.moon;
document.getElementById("season").innerText=getSeason();
document.getElementById("water").innerText="Fresh";

const spi = calculateSPI(d);
document.getElementById("spiText").textContent = spi+"%";

const radius = 102;
const circumference = 2*Math.PI*radius;

document.getElementById("progressArc").style.strokeDashoffset =
circumference-(spi/100)*circumference;

let structure = "Slope Edge";
let depth = (5 + Math.random()*3).toFixed(1);

document.getElementById("depthTxt").textContent="Depth "+depth+"m";
document.getElementById("structureTxt").textContent="Structure "+structure;
document.getElementById("windTxt").textContent="Wind zone "+d.windDir;

let report =
"Wind "+d.windDir+" pushing natural food across the lake.<br><br>"+
"Structure detected: "+structure+".<br>"+
"Estimated feeding depth around "+depth+"m.<br>"+
"Pressure "+d.pressure.toFixed(0)+" hPa influencing carp behaviour.<br>"+
"Cloud cover "+d.cloud+"% affecting feeding confidence.<br>"+
"Moon phase "+d.moon+" influencing activity.<br><br>"+
"Recommended drop: fish 1–2m off structure near "+depth+"m.";

document.getElementById("aiText").innerHTML = report;

}

function updateData(){
render(fetchData());
}

render(fetchData());

function toggleAI(){

let box = document.getElementById("aiText");

if(box.style.display === "block"){
box.style.display = "none";
}else{
box.style.display = "block";
}

}


</script>

</body>
</html>
