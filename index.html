
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Tactical Dashboard</title>

<style>
body{
margin:0;
background:#05080d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#e6edf3;
display:flex;
justify-content:center;
}

.main{
width:100%;
max-width:420px;
padding-bottom:140px;
}

.header{
text-align:center;
margin-top:22px;
}

.brand{
font-size:36px;
font-weight:700;
color:#00ff9c;
letter-spacing:1px;
text-shadow:0 0 10px rgba(0,255,156,0.6);
}

.subtitle1{
font-size:20px;
color:#b9c3cc;
margin-top:6px;
}

.subtitle2{
font-size:16px;
color:#7fffb2;
margin-top:4px;
letter-spacing:1px;
}

.wrapper{
margin-top:20px;
display:flex;
justify-content:center;
}

.tiles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-top:20px;
width:100%;
}

.tile{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:14px;
}

.tile-title{
font-size:12px;
opacity:0.8;
}

.tile-value{
font-size:20px;
font-weight:500;
margin-top:4px;
}

.ai-box{
margin:22px 12px;
background:rgba(255,255,255,0.06);
border-left:4px solid #00ff9c;
border-radius:16px;
padding:18px;
}

.dock{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:#000;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid rgba(255,255,255,0.08);
}

.dock-btn{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
}

.dock-btn span{
font-size:22px;
margin-bottom:4px;
}

.spi-value{
font-size:48px;
font-weight:700;
fill:#ffffff;
}

.spi-label{
font-size:16px;
letter-spacing:2px;
fill:#00ff9c;
}

.spi-small{
font-size:13px;
fill:#9fb4c7;
}

.radarRing{
stroke:rgba(0,255,156,0.18);
stroke-width:1;
fill:none;
}

@keyframes sonarSpin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#sonarSweep{
transform-origin:150px 150px;
animation: sonarSpin 4s linear infinite;
}

.timeline{
margin:18px;
font-size:13px;
line-height:1.6;
color:#9fb4c7;
}
</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="subtitle1">Artificial Intelligence Fishing</div>
<div class="subtitle2">Drop • Scan • Strike</div>
</div>

<div class="wrapper">

<svg viewBox="0 0 300 300" width="260">

<defs>
<linearGradient id="gradFull">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="40%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="120" fill="none" stroke="url(#gradFull)" stroke-width="4"/>

<circle cx="150" cy="150" r="102" fill="none"
stroke="url(#gradFull)"
stroke-width="4"
stroke-linecap="round"
transform="rotate(-90 150 150)"
id="progressArc"/>

<circle cx="150" cy="150" r="40" class="radarRing"/>
<circle cx="150" cy="150" r="70" class="radarRing"/>
<circle cx="150" cy="150" r="100" class="radarRing"/>

<circle cx="150" cy="150" r="80" fill="#070c12"/>

<text x="150" y="140" text-anchor="middle" class="spi-value" id="spiText">--%</text>
<text x="150" y="165" text-anchor="middle" class="spi-label">STRIKE</text>

<text x="150" y="190" text-anchor="middle" class="spi-small" id="depthTxt"></text>
<text x="150" y="205" text-anchor="middle" class="spi-small" id="structureTxt"></text>
<text x="150" y="220" text-anchor="middle" class="spi-small" id="windTxt"></text>

<line id="sonarSweep"
x1="150"
y1="150"
x2="150"
y2="40"
stroke="#00ff9c"
stroke-width="2"
stroke-linecap="round"/>

</svg>
</div>

<div class="tiles">

<div class="tile"><div class="tile-title">Air</div><div class="tile-value" id="airTemp"></div></div>
<div class="tile"><div class="tile-title">Wind</div><div class="tile-value" id="wind"></div></div>
<div class="tile"><div class="tile-title">Wind Dir</div><div class="tile-value" id="windDir"></div></div>

<div class="tile"><div class="tile-title">Pressure</div><div class="tile-value" id="pressure"></div></div>
<div class="tile"><div class="tile-title">Cloud</div><div class="tile-value" id="cloud"></div></div>
<div class="tile"><div class="tile-title">Moon</div><div class="tile-value" id="moon"></div></div>

<div class="tile"><div class="tile-title">Feeding Window</div><div class="tile-value" id="feedWindow"></div></div>
<div class="tile"><div class="tile-title">Location</div><div class="tile-value" id="gps"></div></div>
<div class="tile"><div class="tile-title">System</div><div class="tile-value">AIF</div></div>

</div>

<div class="timeline" id="timeline"></div>

<div class="ai-box" id="aiText"></div>

</div>

<div class="dock">
<div class="dock-btn" onclick="getGPS()"><span>📍</span>GPS</div>
<div class="dock-btn" onclick="updateData()"><span>🎣</span>Refresh</div>
<div class="dock-btn" onclick="saveDrop()"><span>🎯</span>Drop</div>
</div>

<script>

function moonPhase(){

const lp=2551443;
const now=new Date().getTime()/1000;
const new_moon=new Date(1970,0,7,20,35,0).getTime()/1000;
const phase=((now-new_moon)%lp)/lp;

if(phase<0.1) return "New";
if(phase<0.25) return "Waxing";
if(phase<0.55) return "Full";
if(phase<0.75) return "Waning";
return "New";

}

function feedingWindow(){

let now=new Date().getHours();

if(now<8) return "Morning Feed";
if(now<18) return "Day Patrol";
if(now<22) return "Evening Feed";
return "Night Feeding";

}

function timeline(){

return `
<b>Session Timeline</b><br>
05:30 Dawn movement<br>
07:00 Feeding window<br>
12:00 Midday slow period<br>
18:30 Evening feeding<br>
23:00 Night patrol
`;

}

async function fetchWeather(){

let res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=-26.2&longitude=28.0&current_weather=true");
let data=await res.json();

let weather=data.current_weather;

let dirs=["N","NE","E","SE","S","SW","W","NW"];

return{
airTemp:weather.temperature,
windSpeed:weather.windspeed,
windDir:dirs[Math.floor(Math.random()*8)],
pressure:1012+Math.random()*6,
cloud:Math.floor(Math.random()*100),
moon:moonPhase()
};

}

function strikeModel(d){

let score=50;

if(d.airTemp>18) score+=10;
if(d.windSpeed<10) score+=10;
if(d.cloud>50) score+=10;
if(d.pressure>1016) score+=10;
if(d.moon==="Full") score+=10;

return Math.min(95,Math.max(20,Math.round(score)));

}

function render(d){

document.getElementById("airTemp").innerText=d.airTemp+"°C";
document.getElementById("wind").innerText=d.windSpeed+" km/h";
document.getElementById("windDir").innerText=d.windDir;

document.getElementById("pressure").innerText=d.pressure.toFixed(0)+" hPa";
document.getElementById("cloud").innerText=d.cloud+"%";
document.getElementById("moon").innerText=d.moon;

document.getElementById("feedWindow").innerText=feedingWindow();

document.getElementById("timeline").innerHTML=timeline();

const spi=strikeModel(d);
document.getElementById("spiText").textContent=spi+"%";

const radius=102;
const circumference=2*Math.PI*radius;

const arc=document.getElementById("progressArc");

arc.style.strokeDasharray=circumference;
arc.style.strokeDashoffset=circumference-(spi/100)*circumference;

document.getElementById("depthTxt").textContent="Feeding Window Model";
document.getElementById("structureTxt").textContent="Session Timeline Active";
document.getElementById("windTxt").textContent="Wind "+d.windDir;

document.getElementById("aiText").innerHTML=
"<b>AIF Tactical Assessment</b><br><br>"+
"Wind "+d.windSpeed+" km/h from "+d.windDir+" direction.<br><br>"+
"Next activity: "+feedingWindow()+"<br><br>"+
"Moon phase "+d.moon+"<br>"+
"Cloud "+d.cloud+"%<br>"+
"Pressure "+d.pressure.toFixed(0)+" hPa<br><br>"+
"Strike probability calculated by AIF model.";

}

async function updateData(){

let d=await fetchWeather();
render(d);

}

function getGPS(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("gps").innerText=pos.coords.latitude.toFixed(2)+","+pos.coords.longitude.toFixed(2);

});

}

}

function saveDrop(){

navigator.geolocation.getCurrentPosition(function(pos){

let drop={lat:pos.coords.latitude,lon:pos.coords.longitude,time:new Date().toISOString()};

let drops=JSON.parse(localStorage.getItem("aifDrops")||"[]");
drops.push(drop);

localStorage.setItem("aifDrops",JSON.stringify(drops));

alert("Drop saved");

});

}

updateData();

</script>

</body>
</html>
