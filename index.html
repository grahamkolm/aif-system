<!DOCTYPE html> 
<html> 
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Dashboard v5</title> 

<link rel="stylesheet" href=https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lucide@latest"></script> 

<style> 
body{
margin:0;
background:#05080d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#e6edf3;
display:flex;
justify-content:center;
}

.main{
width:100%;
max-width:420px;
padding-bottom:120px;
}

.header{
text-align:center;
margin-top:18px;
}

.brand{
font-size:36px;
font-weight:700;
color:#00ff9c;
}

.subtitle1{font-size:20px;color:#b9c3cc;}
.subtitle2{font-size:15px;color:#7fffb2;}

.instrument{
margin-top:18px;
margin-bottom:6px;
display:flex;
justify-content:center;
}

.spi-container{
position:relative;
width:260px;
height:260px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background: radial-gradient(circle at center, rgba(0,255,156,0.08) 0%, rgba(0,255,156,0,0.04) 35%, transparent 70%);
border-radius:50%;
}

#spiGauge{
width:260px;
height:260px;
position:relative;
z-index:2;
filter: drop-shadow(0 0 4px rgba(0,255,156,0.15));
transition:filter 0.5s ease;
}

.spi-number{
font-size:46px;
fill:white;
font-weight:700;
}

.spi-label{
font-size:18px;
fill:#7fffb2;
}

.spi-desc{
font-size:13px;
fill:#9aa4ad;
}

.tile i{
width:28px;
height:28px;
stroke:#00ffa6;
stroke-width:1.5;
margin-bottom:6px;
}

.tile-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin:18px;
}

.tile{
background:rgba(15,20,28,0.75);
border-radius:12px;
padding:14px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 6px 18px rgba(0,0,0,0.35), inset 0 0 10px rgba(255,255,255,0.05);
}

.tile-title{
font-size:12px;
color:#9aa4ad;
}

.tile-value{
font-size:18px;
margin-top:2px;
}

.tactical-bar{
margin:10px 20px 14px 20px;
padding:12px;
border-radius:14px;
border:1px solid #00ff9c;
background:linear-gradient(180deg, rgba(0,255,156,0.06), rgba(0,255,156,0.04));
text-align:center;
font-size:14px;
font-weight:500;
color:#bfffe3;
box-shadow:0 6px 18px rgba(0,0,0,0.35);
}

.ai-box{
margin:20px;
background:rgba(15,20,28,0.75);
border-radius:14px;
padding:16px;
border-left:4px solid #00ff9c;
cursor:pointer;
}

.ai-content{
max-height:120px;
overflow:hidden;
transition:max-height 0.35s ease;
}

.ai-content.expanded{
max-height:1000px;
}

.dock{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:black;
display:flex;
justify-content:space-evenly;
padding:10px 0;
border-top:1px solid rgba(255,255,255,0.1);
}

.dock-btn{
transition:transform 0.3s ease;
text-align:center;
font-size:11px;
width:16%;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.dock-btn i{
width:22px;
height:22px;
stroke:#00ffa6;
stroke-width:1.7;
margin-bottom:4px;
}
  
.dock-btn span{
font-size:20px;
display:block;
}

</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="subtitle1">Artificial Intelligence Fishing</div>
<div class="subtitle2">Drop • Scan • Strike</div>
</div>

<div class="instrument">
<div class="spi-container">
<svg id="spiGauge" viewBox="0 0 300 300">

<defs>
<linearGradient id="spiGrad">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="50%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="110"
stroke="#1c2b2b"
stroke-width="14"
fill="none"
stroke-dasharray="8 12"/>

<circle id="spiArc"
cx="150"
cy="150"
r="110"
stroke="url(#spiGrad)" 
stroke-width="14"
fill="none"
stroke-linecap="round"
transform="rotate(-90 150 150)"/>

<text x="150" y="145" text-anchor="middle"
class="spi-number"
id="spiValue">--%</text>

<text x="150" y="175"
text-anchor="middle"
class="spi-label">SPI</text>

<text x="150" y="195"
text-anchor="middle"
class="spi-desc">Strike Probability Index</text>

</svg>
</div>
</div>

<div class="tactical-bar" id="tactical">
Waiting for environmental data...
</div>

<div class="tile-grid">

<div class="tile"><i data-lucide="sun"></i><div class="tile-title">air</div><div class="tile-value" id="air">--</div></div>
<div class="tile"><i data-lucide="waves"></i><div class="tile-title">Surface</div><div class="tile-value" id="surface">--</div></div>
<div class="tile"><i data-lucide="arrow-down"></i><div class="tile-title">Bottom</div><div class="tile-value" id="bottom">--</div></div>

<div class="tile"><i data-lucide="gauge"></i><div class="tile-title">Pressure</div><div class="tile-value" id="pressure">--</div></div>
<div class="tile"><i data-lucide="wind"></i><div class="tile-title">Wind</div><div class="tile-value" id="wind">--</div></div>
<div class="tile"><i data-lucide="cloud"></i><div class="tile-title">Cloud</div><div class="tile-value" id="cloud">--</div></div>

<div class="tile"><i data-lucide="moon"></i><div class="tile-title">Moon</div><div class="tile-value" id="moon">--</div></div>
<div class="tile"><i data-lucide="leaf"></i><div class="tile-title">Season</div><div class="tile-value" id="season">--</div></div>
<div class="tile"><i data-lucide="fish"></i><div class="tile-title">Feed</div><div class="tile-value" id="feed">--</div></div>

</div>

<div class="tile">
<i data-lucide="activity"></i>
<div class="tile-title">Pressure Trend</div>
<div class="tile-value" id="trend">--</div>
</div>

<div class="ai-box" onclick="toggleAI()">

<b>AI Tactical Analysis</b>

<div id="aiHint" style="font-size:11px;color:#7fffb2;opacity:0,75;margin-bottom:4px">
Tap to expand
</div>

<div id="aiContent" class="ai-content"></div>

</div>

<div class="dock">
<div class="dock-btn" onclick="refreshDashboard()"> <i id="refreshIcon" data-lucide="refresh-cw"></i> Refresh </div>

<div class="dock-btn" onclick="scoutSpot()"> <i data-lucide="map-pin"></i> Scout </div>

<div class="dock-btn">
<i data-lucide="target"></i>
Drop
</div>

<div class="dock-btn" onclick="openMap()"> <i data-lucide="fish"></i> Map </div>

<div class="dock-btn">
<i data-lucide="settings"></i>
Setup
</div>

<div class="dock-btn">
<i data-lucide="bar-chart-3"></i>
Report
</div>

</div>
<script>

const API_KEY="63ba514dc7c2242cb10cd2632d2569ad"
let pressureHistory=[]
let lastSPI = null

function getMoonPhase(){
let d=new Date()
let lp=2551443
let now=d.getTime()/1000
let new_moon=592500
let phase=((now-new_moon)%lp)/lp
if(phase<0.25)return"Waxing"
if(phase<0.5)return"Full"
if(phase<0.75)return"Waning"
return"New"
}

function sunriseWindow(){
let h=new Date().getHours()
if(h>=5 && h<=9)return 10
if(h>=17 && h<=20)return 12
return 0
}

function seasonalWeight(){
let m=new Date().getMonth()+1
if(m<=2||m==12)return 8
if(m<=5)return 4
if(m<=8)return -4
return 6
}

function windBankPrediction(deg){

if(deg >= 337 || deg < 22) return "South bank (wind pushing north)"
if(deg >= 22 && deg < 67) return "South-West bank"
if(deg >= 67 && deg < 112) return "West bank (wind pushing east)"
if(deg >= 112 && deg < 157) return "North-West bank"
if(deg >= 157 && deg < 202) return "North bank (wind pushing south)"
if(deg >= 202 && deg < 247) return "North-East bank"
if(deg >= 247 && deg < 292) return "East bank (wind pushing west)"
return "South-East bank"

}
  
function windDriftStrength(w){

if(w < 4) return "Low drift"
if(w <= 10) return "Moderate drift"
if(w <= 18) return "Strong feeding drift"
return "Heavy water movement"

}

function windDirectionName(deg){

if(deg >= 337 || deg < 22) return "North"
if(deg < 67) return "North-East"
if(deg < 112) return "East"
if(deg < 157) return "South-East"
if(deg < 202) return "South"
if(deg < 247) return "South-West"
if(deg < 292) return "West"
return "North-West"

}
  
function calculateSPI(p,w,c,windDir,t){

let score = 45

/* PRESSURE TREND */

let trend = getPressureTrend(p)

if(trend === "rising") score += 10
if(trend === "stable") score += 6
if(trend === "falling") score -= 8


/* PRESSURE VELOCITY */

let pressureRate = Math.abs((pressureHistory[pressureHistory.length-1] || 0) - (pressureHistory[0] || 0))

if(pressureRate >= 3) score -= 6
if(pressureRate <= 1) score += 3 

/* PRESSURE STABILIZATION WINDOW */
if(trend === "stable" && p >= 1018 && p <= 1026){
score += 8
}

/* PRESSURE MOMENTUM */

if(pressureRate >= 5){
score -= 8
}

if(pressureRate >= 4 && trend === "falling"){ score += 10 }
 
/* WIND SPEED FEEDING DRIFT */

if(w >= 6 && w <= 18){
score += 8
}

if(w > 18 && w <= 25){
score += 4
}

if(w < 3){
score -= 3
}

/* WIND DIRECTION INTELLIGENCE */

if(w >= 5){

// simulate windward feeding advantage
score += 5

}

/* WIND DIRECTION STABILITY */

if(typeof lastWindDir !== "undefined"){

let diff = Math.abs(windDir - lastWindDir)

if(diff > 45){
score -= 4
}

}

lastWindDir = windDir
  
/* CLOUD COVER */

if(c >= 20 && c <= 70) score += 10
if(c > 80) score += 4
if(c < 10) score -= 3

/* LOW LIGHT FEEDING */

if(c > 60 && sunriseWindow() > 0){
score += 6
}

if(c > 80){
score += 4
}

/* THERMO STABILITY */

let surfaceTemp = t - 0.5
let bottomTemp = t - 1.5

let diff = Math.abs(surfaceTemp - bottomTemp)

if(diff < 1){
score += 4
}
  
/* TEMPERATURE METABOLISM */

if(t >= 16 && t <= 24) score += 12
if(t >= 12 && t < 16) score += 6
if(t > 28) score -= 6
if(t < 10) score -= 8


/* SUNRISE / SUNSET FEEDING WINDOW */

score += sunriseWindow()


/* SEASONAL METABOLISM */

score += seasonalWeight()


/* MOON PHASE */

let moon = getMoonPhase()

if(moon === "Full") score += 5
if(moon === "Waxing") score += 3
if(moon === "Waning") score += 2
if(moon === "New") score -= 3

/* WEATHER PHASE IMPACT */

let phase = detectWeatherPhase(p,trend,c,w)

if(phase === "Pre-frontal feeding window"){ score += 12 }

if(phase === "Post-frontal stabilization"){ score += 6 }

return Math.max(20, Math.min(score,95))

}

function detectWeatherPhase(p,trend,c,w){

if(trend === "falling" && w >= 10 && c > 50){ return "Pre-frontal feeding window"
}

if(trend === "rising" && p >= 1015){
return "Post-frontal stabilization"
}

if(trend === "stable" && p >= 1018 && p <= 1025){ return "Stable high pressure phase"
}

return "Unstable weather phase"

}

function detectStrikeWindow(spi,trend,w,c){

let hour = new Date().getHours()

/* sunrise window */
if(hour >= 5 && hour <= 9 && spi >= 60){ return "Sunrise feeding window active"
}

/* sunset window */
if(hour >= 17 && hour <= 20 && spi >= 60){ return "Sunset feeding window active"
}

/* storm front feeding */
if(trend === "falling" && w >= 10 && c > 50){ return "Pre-frontal strike window forming"
}

/* post front stabilization */
if(trend === "rising" && spi >= 65){
return "Post-frontal feeding window"
}

if(spi >= 75){
return "High probability feeding activity"
}

return "No major strike window detected"
}

function predictStrikeDuration(spi,trend,w,c){

let duration = 20

/* SPI influence */

if(spi >= 80) duration += 40
else if(spi >= 65) duration += 25
else if(spi >= 50) duration += 10

/* pressure trend */

if(trend === "stable") duration += 10
if(trend === "rising") duration += 5
if(trend === "falling") duration -= 5

/* wind feeding drift */

if(w >= 6 && w <= 15) duration += 10
if(w > 18) duration -= 5

/* cloud low light */

if(c > 60) duration += 5

return duration

}
  
function getPressureTrend(p){

pressureHistory.push(p)
if(pressureHistory.length>6){pressureHistory.shift()}
if(pressureHistory.length<2){return"stable"}

let diff=pressureHistory[pressureHistory.length-1]-pressureHistory[0]
if(diff>1)return"rising"
if(diff<-1)return"falling"
return"stable"
}

async function fetchWeather(){

try{

let r = await fetch("https://api.openweathermap.org/data/2.5/weather?lat=-26.2&lon=28.0&units=metric&appid=" + API_KEY);

let d = await r.json();

if(d.main){
render(d);
}

}catch(e){

document.getElementById("tactical").innerText="Weather connection failed";

}

}

function render(d){

let t=d.main.temp
let p=d.main.pressure
let w=d.wind.speed*3.6
let c=d.clouds.all
let windDir=d.wind.deg

let spi=calculateSPI(p,w,c,windDir,t)

updateSPI(spi)

let gauge=document.getElementById("spiGauge")
if(spi>=70){
gauge.style.filter="drop-shadow(0 0 25px rgba(0,255,156,0.8))"
}else{
gauge.style.filter="drop-shadow(0 0 12px rgba(0,255,156,0.25))"
}

document.getElementById("air").innerText=t.toFixed(1)+"°C"
let airIcon=document.querySelector('[data-lucide="sun"]')

if(airIcon){
if(t >= 30){
airIcon.style.stroke="#ff3b3b"
}
else if(t >= 25){
airIcon.style.stroke="#ffc400"
}
else{
airIcon.style.stroke="#00ffa6"
}
}
  
document.getElementById("surface").innerText=(t-0.5).toFixed(1)+"°C"
let surfaceIcon=document.querySelector('[data-lucide="waves"]')

if(surfaceIcon){

let sTemp=t-0.5

if(sTemp >= 30){
surfaceIcon.style.stroke="#ff3b3b"
}
else if(sTemp >= 22){
surfaceIcon.style.stroke="#ffc400"
}
else{
surfaceIcon.style.stroke="#00ffa6"
}

}

document.getElementById("bottom").innerText=(t-1.5).toFixed(1)+"°C"
let bottomIcon=document.querySelector('[data-lucide="arrow-down"]')

if(bottomIcon){

let bTemp=t-1.5

if(bTemp >= 28){
bottomIcon.style.stroke="#ff3b3b"
}
else if(bTemp >= 20){
bottomIcon.style.stroke="#ffc400"
}
else{
bottomIcon.style.stroke="#00ffa6"
}

}

document.getElementById("pressure").innerText=p+" hPa"
let pressureIcon=document.querySelector('[data-lucide="gauge"]')

if(pressureIcon){

if(p >= 1022){
pressureIcon.style.stroke="#ffc400"
}
else if(p <= 1005){
pressureIcon.style.stroke="#ff3b3b"
}
else{
pressureIcon.style.stroke="#00ffa6"
}

}

/* PRESSURE STABILIZATION WINDOW */

document.getElementById("wind").innerText=w.toFixed(1)+" km/h"
let windIcon=document.querySelector('[data-lucide="wind"]')

if(windIcon){

if(w > 20){
windIcon.style.stroke="#ff3b3b"
}
else if(w > 12){
windIcon.style.stroke="#ffc400"
}
else{
windIcon.style.stroke="#00ffa6"
}

}

document.getElementById("cloud").innerText=c+"%"
let cloudIcon=document.querySelector('[data-lucide="cloud"]')

if(cloudIcon){

if(c >= 80){
cloudIcon.style.stroke="#ff3b3b"
}
else if(c >= 40){
cloudIcon.style.stroke="#ffc400"
}
else{
cloudIcon.style.stroke="#00ffa6"
}

}

document.getElementById("moon").innerText=getMoonPhase()
let moonIcon=document.querySelector('[data-lucide="moon"]')

if(moonIcon){
moonIcon.style.stroke="#8fb3ff"
}

document.getElementById("season").innerText=getSeason()
let seasonIcon=document.querySelector('[data-lucide="leaf"]')

if(seasonIcon){
seasonIcon.style.stroke="#00ffa6"
}

document.getElementById("feed").innerText=feeding(spi)
let feedIcon=document.querySelector('[data-lucide="fish"]')

if(feedIcon){

if(spi >= 70){
feedIcon.style.stroke="#00ffa6"
}
else if(spi >= 50){
feedIcon.style.stroke="#ffc400"
}
else{
feedIcon.style.stroke="#ff3b3b"
}

}

let tiles = document.querySelectorAll(".tile")

tiles.forEach(tile=>{
if(spi >= 80){
tile.style.boxShadow =
"0 0 12px rgba(0,255,156,0.25), inset 0 0 10px rgba(255,255,255,0.05)"
}else{
tile.style.boxShadow =
"0 6px 18px rgba(0,0,0,0.35), inset 0 0 10px rgba(255,255,255,0.05)"
}
})

let trend=getPressureTrend(p)
document.getElementById("trend").innerText=trend

let windDirName = windDirectionName(windDir)

let strikeWindow = detectStrikeWindow(spi,trend,w,c)
let stabilization = detectPressureStabilization()

document.getElementById("tactical").innerText = "SPI "+spi+"% • "+feeding(spi)+" feeding • "+strikeWindow

generateAI(spi,p,w,c,windDir,t)
}

function detectPressureStabilization(){

if(pressureHistory.length < 4){
return false
}

let change = Math.abs(
pressureHistory[pressureHistory.length-1] - pressureHistory[pressureHistory.length-2]
)

if(change <= 0.3){
return true
}

return false

}
    
function updateSPI(v){

if(lastSPI !== null){
v = Math.round((v + lastSPI) /2)
}

lastSPI = v;

let arc = document.getElementById("spiArc") 
let r = 110 
let C = 2 * Math.PI * r

arc.style.strokeDasharray = C
arc.style.strokeDashoffset = C - (v/100) * C

document.getElementById("spiValue").textContent=v+"%";

/* SPI COLOR SYSTEM */

if(v >= 70){
arc.style.stroke="#00ffa6"
arc.style.filter="drop-shadow(0 0 6px rgba(0,255,166,0.35))"
}
else if(v >= 40){
arc.style.stroke="#ffc400"
arc.style.filter="drop-shadow(0 0 5px rgba(255,196,0,0.30))"
}
else{
arc.style.stroke="#ff3b3b"
arc.style.filter="drop-shadow(0 0 5px rgba(255,59,59,0.30))"
}

}

function feeding(spi){
if(spi>=70)return"Heavy"
if(spi>=55)return"Moderate"
if(spi>=40)return"Light"
return"Holding"
}

function getSeason(){
let m=new Date().getMonth()+1
if(m<=2||m==12)return"Summer"
if(m<=5)return"Autumn"
if(m<=8)return"Winter"
return"Spring"
}

function predictFeedingZone(spi,t,w){

let surfaceTemp = t - 0.5
let bottomTemp = t - 1.5

if(spi >= 80 && w >= 8){
return "Windward shallow patrol (2–4m)"
}

if(spi >= 80){
return "Slope feeding edges (3–6m)"
}

if(spi >= 65 && w >= 6){
return "Windward slope edges (4–7m)"
}

if(spi >= 50){
return "Mid-depth transition zones (5–8m)"
}

return "Deeper holding areas (8–12m)"

}

function predictPatrolRoute(spi,w,windDir){

if(spi >= 80 && w >= 8){
return "Windward patrol route along shallow shelf (2–4m)"
}

if(spi >= 65 && w >= 6){
return "Slope transition patrol along windward bank (3–6m)"
}

if(spi >= 50){
return "Mid-depth contour patrol route (5–8m)"
}

return "Deep basin patrol route (8–12m)"

}

function predictFeedingEntry(w, windDir){

if(w < 5){
return "Fish holding near structure – no strong entry direction."
}

if(windDir >= 337 || windDir < 22){
return "Fish likely entering swim from SOUTH bank (wind pushing food north)."
}

if(windDir >= 22 && windDir < 67){
return "Fish likely entering from SOUTH-WEST slope."
}

if(windDir >= 67 && windDir < 112){
return "Fish likely entering swim from WEST bank."
}

if(windDir >= 112 && windDir < 157){
return "Fish likely entering from NORTH-WEST slope."
}

if(windDir >= 157 && windDir < 202){
return "Fish likely entering swim from NORTH bank."
}

if(windDir >= 202 && windDir < 247){
return "Fish likely entering from NORTH-EAST slope."
}

if(windDir >= 247 && windDir < 292){
return "Fish likely entering swim from EAST bank."
}

return "Fish likely entering from SOUTH-EAST slope."

}
  
function predictDriftCorridor(w, windDir){

if(w < 5){
return "Weak drift – fish structure directly."
}

if(w >= 5 && w <= 15){
return "Moderate drift corridor forming along windward slope."
}

return "Strong drift corridor – fish slightly off the bank along feeding lane."
}
  
function generateAI(spi,p,w,c,windDir,t){

let aiText = "";
let trend = getPressureTrend(p);

/* ENVIRONMENTAL ASSESSMENT */

aiText += "<b>Environmental Scan</b><br>";

if(p >= 1015 && p <= 1022){
aiText += "Stable pressure detected.<br>"; }

let stabilization = detectPressureStabilization()

if(stabilization){
aiText += "Pressure stabilization detected – feeding window forming.<br>"; }

/* ACTIVITY ASSESSMENT */

aiText += "<br><b>Activity Assessment</b><br>";

aiText += "Strike Probability Index: <b>" + spi + "%</b><br>";
let strikeDuration = predictStrikeDuration(spi,trend,w,c)
aiText += "Estimated strike window: <b>" + strikeDuration + " minutes</b><br>";
  
if(spi >= 70){
aiText += "High feeding probability.<br>"; } else if(spi >= 55){ aiText += "Moderate feeding activity expected.<br>"; } else{ aiText += "Reduced feeding activity.<br>"; }


/* WATER BEHAVIOUR */

aiText += "<br><b>Water Behaviour</b><br>";

if(c > 80){
aiText += "Low light conditions encouraging shallow patrol.<br>"; } else if(c < 30){ aiText += "Clear skies warming surface layers.<br>"; } else{ aiText += "Balanced light penetration in the water column.<br>"; }

/* TACTICAL RECOMMENDATION */

aiText += "<br><b>Tactical Recommendation</b><br>";

let bank = windBankPrediction(windDir)
let drift = windDriftStrength(w)
let zone = predictFeedingZone(spi,t,w)
let patrol = predictPatrolRoute(spi,w,windDir) 
let driftLane = predictDriftCorridor(w, windDir) 
let entry = predictFeedingEntry(w, windDir)
  
if(w >= 5){
aiText += "Focus on windward banks and slope edges.<br>"; }else{ aiText += "Target deeper structure and basin patrol routes.<br>"; }

aiText += "Wind direction: " + windDirectionName(windDir) + ".<br>"; 
aiText += "Windward feeding bank: <b>" + bank + "</b><br>"; 
aiText += "Feeding drift strength: <b>" + drift + "</b><br>"; 
aiText += "Drift corridor: <b>" + driftLane + "</b><br>"; 
aiText += "Feeding entry direction: <b>" + entry + "</b><br>"; 
aiText += "Recommended feeding zone: <b>" + zone + "</b><br>"; 
aiText += "Likely patrol route: <b>" + patrol + "</b><br>";

/* OUTPUT */

document.getElementById("aiContent").innerHTML = aiText;

}

function toggleAI(){

let content = document.getElementById("aiContent")
let hint = document.getElementById("aiHint")

content.classList.toggle("expanded")

if(content.classList.contains("expanded")){
hint.innerText="Tap to collapse"
}else{
hint.innerText="Tap to expand"
}

}

function refreshDashboard(){

let icon = document.getElementById("refreshIcon")

if(icon){
icon.style.transform = "rotate(360deg)"
icon.style.transition = "transform 0.6s"
}

fetchWeather()

setTimeout(()=>{
if(icon){
icon.style.transform = "rotate(0deg)"
}
},600)

}

function scoutSpot(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

let windDir = lastWindDir || 0
let bank = windBankPrediction(windDir)

alert(
"Scout location locked\n\n" +
"Latitude: " + lat.toFixed(5) +
"\nLongitude: " + lon.toFixed(5) +
"\n\nWindward bank: " + bank
)

})

}

function saveDrop(){
navigator.geolocation.getCurrentPosition(function(pos){

let history=JSON.parse(localStorage.getItem("aif_drops")||"[]")

history.push({
lat:pos.coords.latitude,
lon:pos.coords.longitude,
time:new Date().toISOString()
})

localStorage.setItem("aif_drops",JSON.stringify(history))

alert("Drop saved")

})
}

function openMap(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

alert(
"Map view coming soon\n\n"+
"Your position:\n"+
lat + ", " + lon
)

})

}
