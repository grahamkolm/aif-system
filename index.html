
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Tactical Dashboard</title>

<style>
body{
margin:0;
background:#05080d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#e6edf3;
display:flex;
justify-content:center;
}

.main{width:100%;max-width:420px;padding-bottom:140px;}

.header{text-align:center;margin-top:22px;}

.brand{
font-size:36px;
font-weight:700;
color:#00ff9c;
letter-spacing:1px;
text-shadow:0 0 12px rgba(0,255,156,0.7);
}

.subtitle1{font-size:20px;color:#b9c3cc;margin-top:6px;}
.subtitle2{font-size:16px;color:#7fffb2;margin-top:4px;letter-spacing:1px;}

.wrapper{margin-top:20px;display:flex;justify-content:center;}

.tiles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin:20px;
}

.tile{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:14px;
}

.tile-title{font-size:12px;opacity:0.8;display:flex;align-items:center;gap:6px;}
.tile-value{font-size:20px;margin-top:4px;}

.icon{font-size:16px}

.ai-box{
margin:22px 18px;
background:rgba(255,255,255,0.06);
border-left:4px solid #00ff9c;
border-radius:16px;
padding:18px;
}

.dock{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:#000;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid rgba(255,255,255,0.08);
}

.dock-btn{display:flex;flex-direction:column;align-items:center;font-size:12px;cursor:pointer;}
.dock-btn span{font-size:22px;margin-bottom:4px;}

.spi-value{font-size:48px;font-weight:700;fill:#ffffff;}
.spi-label{font-size:16px;letter-spacing:2px;fill:#00ff9c;}
.spi-small{font-size:13px;fill:#9fb4c7;}

.radarRing{stroke:rgba(0,255,156,0.18);stroke-width:1;fill:none;}

#sonarSweep{
transform-origin:150px 150px;
animation:spin 4s linear infinite;
filter:drop-shadow(0 0 6px #00ff9c);
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="subtitle1">Artificial Intelligence Fishing</div>
<div class="subtitle2">Drop • Scan • Strike</div>
</div>

<div class="wrapper">

<svg viewBox="0 0 300 300" width="260">

<defs>
<linearGradient id="gradFull">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="40%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="120" fill="none" stroke="url(#gradFull)" stroke-width="4"/>

<circle
cx="150"
cy="150"
r="102"
fill="none"
stroke="url(#gradFull)"
stroke-width="4"
stroke-linecap="round"
transform="rotate(-90 150 150)"
id="progressArc"/>

<circle cx="150" cy="150" r="40" class="radarRing"/>
<circle cx="150" cy="150" r="70" class="radarRing"/>
<circle cx="150" cy="150" r="100" class="radarRing"/>

<circle cx="150" cy="150" r="80" fill="#070c12"/>

<text x="150" y="140" text-anchor="middle" class="spi-value" id="spiText">--%</text>
<text x="150" y="165" text-anchor="middle" class="spi-label">STRIKE</text>

<text x="150" y="190" text-anchor="middle" class="spi-small" id="depthTxt"></text>
<text x="150" y="205" text-anchor="middle" class="spi-small" id="structureTxt"></text>
<text x="150" y="220" text-anchor="middle" class="spi-small" id="windTxt"></text>

<line id="sonarSweep"
x1="150"
y1="150"
x2="150"
y2="40"
stroke="#00ff9c"
stroke-width="2"
stroke-linecap="round"/>

</svg>
</div>

<div class="tiles">

<div class="tile"><div class="tile-title"><span class="icon" id="airIcon">🌡</span>Air</div><div class="tile-value" id="airTemp"></div></div>
<div class="tile"><div class="tile-title"><span class="icon">🌊</span>Surface</div><div class="tile-value" id="surfaceTemp"></div></div>
<div class="tile"><div class="tile-title"><span class="icon">🔻</span>Bottom</div><div class="tile-value" id="bottomTemp"></div></div>

<div class="tile"><div class="tile-title"><span class="icon" id="pressureIcon">⭕</span>Pressure</div><div class="tile-value" id="pressure"></div></div>
<div class="tile"><div class="tile-title"><span class="icon" id="windIcon">🌬</span>Wind</div><div class="tile-value" id="wind"></div></div>
<div class="tile"><div class="tile-title"><span class="icon" id="cloudIcon">☁</span>Cloud</div><div class="tile-value" id="cloud"></div></div>

<div class="tile"><div class="tile-title"><span class="icon">🌙</span>Moon</div><div class="tile-value" id="moon"></div></div>
<div class="tile"><div class="tile-title"><span class="icon">🍂</span>Season</div><div class="tile-value" id="season"></div></div>
<div class="tile"><div class="tile-title"><span class="icon">🎣</span>Feed</div><div class="tile-value" id="feed"></div></div>

</div>

<div class="ai-box" id="aiText"></div>

</div>

<div class="dock">
<div class="dock-btn" onclick="getGPS()"><span>📍</span>GPS</div>
<div class="dock-btn" onclick="updateData()"><span>🎣</span>Refresh</div>
<div class="dock-btn" onclick="saveDrop()"><span>🎯</span>Drop</div>
</div>

<script>

function moonPhase(){
const lp=2551443;
const now=new Date().getTime()/1000;
const new_moon=new Date(1970,0,7,20,35,0).getTime()/1000;
const phase=((now-new_moon)%lp)/lp;
if(phase<0.1) return "New";
if(phase<0.25) return "Waxing";
if(phase<0.55) return "Full";
if(phase<0.75) return "Waning";
return "New";
}

function season(){
let m=new Date().getMonth()+1;
if(m>=12||m<=2) return "Summer";
if(m<=5) return "Autumn";
if(m<=8) return "Winter";
return "Spring";
}

function feedingWindow(){
let h=new Date().getHours();
if(h<8) return "Morning";
if(h<18) return "Day Patrol";
if(h<22) return "Evening";
return "Night";
}

function windLane(dir){
return "Wind "+dir+" likely pushing natural food toward the downwind bank.";
}

function strikeModel(temp,wind,cloud,pressure){
let score=50;
if(temp>18) score+=10;
if(wind<10) score+=10;
if(cloud>40) score+=10;
if(pressure>1015) score+=10;
return Math.min(95,Math.max(20,Math.round(score)));
}

async function fetchWeather(){
let r=await fetch("https://api.openweathermap.org/data/2.5/weather?lat=-26.2&lon=28.0&units=metric&appid=63ba514dc7c2242cb10cd2632d2569ad");
let j=await r.json();

return{
temp:j.main.temp,
pressure:j.main.pressure,
wind:j.wind.speed,
windDir:j.wind.deg,
cloud:j.clouds.all
}
}

function windDir(d){
const dirs=["N","NE","E","SE","S","SW","W","NW"];
return dirs[Math.round(d/45)%8];
}

function render(d){

let windDirection = windDir(d.windDir);

document.getElementById("airTemp").innerText=d.temp.toFixed(1)+"°C";
document.getElementById("surfaceTemp").innerText=(d.temp-0.5).toFixed(1)+"°C";
document.getElementById("bottomTemp").innerText=(d.temp-1.5).toFixed(1)+"°C";

document.getElementById("pressure").innerText=d.pressure+" hPa";
document.getElementById("wind").innerText=d.wind.toFixed(1)+" km/h "+windDirection;
document.getElementById("cloud").innerText=d.cloud+"%";

document.getElementById("moon").innerText=moonPhase();
document.getElementById("season").innerText=season();
document.getElementById("feed").innerText=feedingWindow();

let spi=strikeModel(d.temp,d.wind,d.cloud,d.pressure);

document.getElementById("spiText").textContent=spi+"%";

const radius=102;
const circumference=2*Math.PI*radius;

document.getElementById("progressArc").style.strokeDasharray=circumference;
document.getElementById("progressArc").style.strokeDashoffset=circumference-(spi/100)*circumference;

document.getElementById("depthTxt").textContent="Depth 6.5m";
document.getElementById("structureTxt").textContent="Slope Edge";
document.getElementById("windTxt").textContent="Wind "+windDirection;

document.getElementById("aiText").innerHTML=
"<b>AIF Tactical Assessment</b><br><br>"+
windLane(windDirection)+"<br><br>"+
"Pressure "+d.pressure+" hPa influencing carp behaviour.<br>"+
"Cloud cover "+d.cloud+"% affecting feeding confidence.<br>"+
"Moon phase "+moonPhase()+" influencing feeding activity.<br><br>"+
"Recommended tactic: fish slope edges where wind lanes push food.";

applyIconColors(d);
}

function applyIconColors(d){

let airIcon = document.getElementById("airIcon");
let pressureIcon = document.getElementById("pressureIcon");
let windIcon = document.getElementById("windIcon");
let cloudIcon = document.getElementById("cloudIcon");

airIcon.style.color = d.temp>18 ? "#00ff9c":"#9fb4c7";

if(d.pressure>1018) pressureIcon.style.color="#00ff9c";
else if(d.pressure>1008) pressureIcon.style.color="#ffc400";
else pressureIcon.style.color="#ff3b3b";

if(d.wind<12) windIcon.style.color="#00ff9c";
else windIcon.style.color="#ff3b3b";

if(d.cloud>40) cloudIcon.style.color="#00ff9c";
else cloudIcon.style.color="#9fb4c7";

}

function updateData(){
fetchWeather().then(render);
}

function getGPS(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(pos){
alert("GPS:\nLat "+pos.coords.latitude.toFixed(5)+"\nLon "+pos.coords.longitude.toFixed(5));
});
}
}

function saveDrop(){
navigator.geolocation.getCurrentPosition(function(pos){
let drop={lat:pos.coords.latitude,lon:pos.coords.longitude,time:new Date().toISOString()};
let drops=JSON.parse(localStorage.getItem("aifDrops")||"[]");
drops.push(drop);
localStorage.setItem("aifDrops",JSON.stringify(drops));
alert("Drop saved");
});
}

updateData();

</script>

</body>
</html>
