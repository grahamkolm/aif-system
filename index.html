
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIF Tactical Dashboard – Stable Core</title>

<style>
body{
margin:0;
background:#05080d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#e6edf3;
display:flex;
justify-content:center;
}

.main{width:100%;max-width:420px;padding-bottom:120px;}
.header{text-align:center;margin-top:20px;}

.brand{
font-size:36px;
font-weight:700;
color:#00ff9c;
text-shadow:0 0 15px #00ff9c;
}

.subtitle1{font-size:20px;color:#b9c3cc;margin-top:6px;}
.subtitle2{font-size:16px;color:#7fffb2;margin-top:4px;}

.wrapper{display:flex;justify-content:center;margin-top:18px;}
svg{width:260px;height:260px;}
.ring{fill:none;stroke-width:4}

.spi-value{font-size:48px;font-weight:700;fill:white;}
.spi-label{font-size:16px;fill:#00ff9c;letter-spacing:2px;}

#trail{
stroke:#00ff9c;
stroke-width:16;
opacity:0.10;
transform-origin:150px 150px;
animation:spin 6s linear infinite;
filter:blur(6px);
}

#sweep{
stroke:#00ff9c;
stroke-width:3;
transform-origin:150px 150px;
animation:spin 6s linear infinite;
filter:drop-shadow(0 0 6px #00ff9c) drop-shadow(0 0 16px #00ff9c);
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.tactical{
margin:12px 20px;
padding:10px;
border-radius:12px;
border:1px solid #00ff9c;
background:rgba(0,255,156,0.06);
box-shadow:0 0 12px rgba(0,255,156,0.5);
text-align:center;
font-size:13px;
}

.sep{color:#00ff9c;padding:0 6px;}

.tiles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin:20px;
}

.tile{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:14px;
}

.tile-title{
font-size:13px;
display:flex;
align-items:center;
gap:6px;
}

.tile-value{font-size:20px;margin-top:4px;}

.icon{
width:18px;
height:18px;
stroke:#9fb3c8;
stroke-width:2;
fill:none;
}

.ai-box{
margin:20px;
background:rgba(255,255,255,0.06);
border-left:4px solid #00ff9c;
border-radius:16px;
padding:16px;
cursor:pointer;
}

.ai-extra{display:none;margin-top:10px;}

.dock{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:black;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid rgba(255,255,255,0.1);
}

.dock-btn{text-align:center;font-size:12px;}
.dock-btn span{font-size:22px;display:block;}
</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="subtitle1">Artificial Intelligence Fishing</div>
<div class="subtitle2">Drop • Scan • Strike</div>
</div>

<div class="wrapper">

<svg viewBox="0 0 300 300">

<defs>
<linearGradient id="grad">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="40%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#00ff9c"/>
</linearGradient>
</defs>

<circle cx="150" cy="150" r="120" stroke="url(#grad)" class="ring"/>

<circle id="arc"
cx="150"
cy="150"
r="102"
stroke="url(#grad)"
class="ring"
stroke-linecap="round"
transform="rotate(-90 150 150)"/>

<line id="trail" x1="150" y1="150" x2="150" y2="25"/>
<line id="sweep" x1="150" y1="150" x2="150" y2="40"/>

<circle cx="150" cy="150" r="80" fill="#070c12"/>

<text x="150" y="140" text-anchor="middle" class="spi-value" id="spi">--%</text>
<text x="150" y="165" text-anchor="middle" class="spi-label">STRIKE</text>

<polygon id="windArrow" points="150,20 144,34 156,34" fill="#00ff9c"/>
<polygon id="dropArrow" points="150,280 144,266 156,266" fill="#ffc400"/>

</svg>

</div>

<div class="tactical">
Depth 6.5m <span class="sep">│</span> Slope Edge <span class="sep">│</span> Drift → S <span class="sep">│</span> Drop → S
</div>

<div class="tiles">

<div class="tile">
<div class="tile-title">
<svg class="icon" viewBox="0 0 24 24"><path d="M12 3v10"/><circle cx="12" cy="17" r="4"/></svg>
Air
</div>
<div class="tile-value" id="air"></div>
</div>

<div class="tile">
<div class="tile-title">
<svg class="icon" viewBox="0 0 24 24"><path d="M2 12c4 0 4-2 8-2s4 2 8 2 4-2 4-2"/></svg>
Surface
</div>
<div class="tile-value" id="surface"></div>
</div>

<div class="tile">
<div class="tile-title">
<svg class="icon" viewBox="0 0 24 24"><path d="M12 20l-6-8h12z"/></svg>
Bottom
</div>
<div class="tile-value" id="bottom"></div>
</div>

<div class="tile"><div class="tile-title">Pressure</div><div class="tile-value" id="pressure"></div></div>
<div class="tile"><div class="tile-title">Wind</div><div class="tile-value" id="wind"></div></div>
<div class="tile"><div class="tile-title">Cloud</div><div class="tile-value" id="cloud"></div></div>

<div class="tile"><div class="tile-title">Moon</div><div class="tile-value" id="moon"></div></div>
<div class="tile"><div class="tile-title">Season</div><div class="tile-value" id="season"></div></div>
<div class="tile"><div class="tile-title">Feed</div><div class="tile-value" id="feed"></div></div>

</div>

<div class="ai-box" onclick="toggleAI()">
<b>AIF Tactical Assessment</b><br>
<span id="ai"></span>

<div class="ai-extra" id="extra">
<b>Bite Windows</b><br>
06:10 Dawn feeding<br>
18:45 Evening patrol<br>
23:30 Night feeding
</div>
</div>

</div>

<div class="dock">
<div class="dock-btn" onclick="getGPS()"><span>📍</span>GPS</div>
<div class="dock-btn" onclick="refreshData()"><span>⟳</span>Refresh</div>
<div class="dock-btn" onclick="saveDrop()"><span>🎯</span>Drop</div>
<div class="dock-btn" onclick="testMode()"><span>🧪</span>Test</div>
</div>

<script>

function toggleAI(){
let e=document.getElementById("extra");
e.style.display=e.style.display==="block"?"none":"block";
}

function season(){
let m=new Date().getMonth()+1;
if(m<=2||m==12)return "Summer";
if(m<=5)return "Autumn";
if(m<=8)return "Winter";
return "Spring";
}

function feeding(){
let h=new Date().getHours();
if(h<8)return "Morning";
if(h<18)return "Day";
if(h<22)return "Evening";
return "Night";
}

let scenarios=[
{air:18,surface:19,bottom:17,pressure:1014,wind:6,cloud:70,score:72},
{air:12,surface:13,bottom:12,pressure:1002,wind:14,cloud:50,score:48},
{air:26,surface:27,bottom:25,pressure:1008,wind:4,cloud:20,score:35}
];

let idx=0;

function render(d){

document.getElementById("air").innerText=d.air+"°C";
document.getElementById("surface").innerText=d.surface+"°C";
document.getElementById("bottom").innerText=d.bottom+"°C";
document.getElementById("pressure").innerText=d.pressure+" hPa";
document.getElementById("wind").innerText=d.wind+" km/h";
document.getElementById("cloud").innerText=d.cloud+"%";

document.getElementById("moon").innerText="Waxing";
document.getElementById("season").innerText=season();
document.getElementById("feed").innerText=feeding();

document.getElementById("spi").textContent=d.score+"%";

let r=102;
let c=2*Math.PI*r;
let arc=document.getElementById("arc");
arc.style.strokeDasharray=c;
arc.style.strokeDashoffset=c-(d.score/100)*c;

document.getElementById("ai").innerText=
"Wind pushing natural food toward the downwind bank. Carp likely patrol the slope edge around 6–7m depth during the next feeding window.";
}

function refreshData(){
render(scenarios[0]);
}

function testMode(){
idx++;
if(idx>=scenarios.length)idx=0;
render(scenarios[idx]);
}

function getGPS(){
navigator.geolocation.getCurrentPosition(function(pos){
alert("GPS: "+pos.coords.latitude.toFixed(5)+", "+pos.coords.longitude.toFixed(5));
});
}

function saveDrop(){
navigator.geolocation.getCurrentPosition(function(pos){

let drop={
lat:pos.coords.latitude,
lon:pos.coords.longitude,
time:new Date().toISOString()
};

let drops=JSON.parse(localStorage.getItem("aif_drops")||"[]");
drops.push(drop);
localStorage.setItem("aif_drops",JSON.stringify(drops));

alert("Drop saved");
});
}

render(scenarios[0]);

</script>

</body>
</html>
