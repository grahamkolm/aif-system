<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Scout Spot</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0a1a1a, #000);
  color: white;
}

/* Container */
.scout {
  padding:20px;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px
}

.close {
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  opacity:0.8;
  cursor:pointer;
}

/* Info bar */
.info {
  margin-top:15px;
  padding:12px 18px;
  border-radius:25px;
  background:rgba(0,255,156,0.08);
  border:1px solid rgba(0,255,156,0.3);
  font-size:14px;
  box-shadow: 0 0 20px rgba(0,255,156,0.15);
}

/* Depth card */
.depth-card {
  margin-top:20px;
  height:220px;
  border-radius:20px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  font-weight:bold;
  overflow:hidden;
}

/* Image */
.depth-card::before {
  content:"";
  position:absolute;
  inset:0;
  background: url('underwater.jpg') center/cover no-repeat;
  opacity:0.4;
}

/* Overlay */
.depth-card::after {
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)); }

/* Text */
.depth-card span {
  position:relative;
  z-index:2;
}

/* Sections */
.section {
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08); }

/* Title */
.section h3 {
  margin:0 0 10px 0;
  font-size:16px;
  opacity:0.8;
}

/* Buttons row */
.option {
  padding:10px 18px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);   /* soft white glass */
  border:1px solid rgba(255,255,255,0.12);
  color:#eaeaea;
  cursor:pointer;
  transition:all 0.2s ease;
  backdrop-filter: blur(6px);
}

.option:hover {
  background:rgba(255,255,255,0.12);
}

/* SELECTED (green) */
.option.active {
  background:linear-gradient(135deg, #00ff9c, #00d084);
  color:#003322;
  font-weight:600;
  box-shadow:
    0 0 12px rgba(0,255,156,0.7),
    0 0 25px rgba(0,255,156,0.4);
}

/* Option button */
.option {
  padding:10px 18px;
  border-radius:14px;
  background:#0b0b0b;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  transition:all 0.2s ease;
}

.option.active {
  background:linear-gradient(135deg, #00ff9c, #00d084);
  color:#000;
  font-weight:600;
  box-shadow:0 0 10px rgba(0,255,156,0.6), 0 0 25px rgba(0,255,156,0.3); }
}

/* Button */
.btn {
  margin-top:25px;
  width:100%;
  padding:16px;
  border-radius:18px;
  border:none;
  background:linear-gradient(135deg, #00ff9c, #00c97a);
  font-size:18px;
  font-weight:bold;
  color:#003322;   /* <-- FIX */
  cursor:pointer;
}

/* Cancel */
.cancel {
  margin-top:10px;
  text-align:center;
  opacity:0.6;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="scout">

  <!-- Header -->
  <div class="header">
    <h1>Scout Spot</h1>
    <div class="close">X</div>
  </div>

  <!-- Info -->
  <div class="info">
    SPI: 52% • Wind: 13 km/h NW • Pressure: 1014
  </div>

  <!-- Depth -->
  <div class="depth-card">
  <span> 6m </span>  
  </div>

  <!-- Bottom -->
  <div class="section">
    <h3>Bottom Type</h3>
    <div class="options">
      <div class="option">Gravel</div>
      <div class="option active">Silt</div>
      <div class="option">Clay</div>
      <div class="option">Weed</div>
    </div>
  </div>

  <!-- Fish -->
  <div class="section">
    <h3>Fish Activity</h3>
    <div class="options">
      <div class="option">None</div>
      <div class="option active">Bubbles</div>
      <div class="option">Active</div>
      <div class="option">Showing</div>
    </div>
  </div>

  <!-- Water -->
  <div class="section">
    <h3>Water Colour</h3>
    <div class="options">
      <div class="option">Clear</div>
      <div class="option">Green</div>
      <div class="option active">Brown</div>
      <div class="option">Dirty</div>
    </div>
  </div>

  <!-- Button -->
  <button class="btn">Start Analysis</button>

  <div class="cancel">Cancel</div>

</div>

<script>

/* Toggle selection */
document.querySelectorAll('.options').forEach(group => {
  group.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
});

</script>

</body>
</html>
