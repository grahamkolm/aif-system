<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AIF™ Tactical Dashboard</title>

<style>

body{
margin:0;
background:#05080d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto; color:#e6edf3; min-height:100vh; display:flex; justify-content:center; }

.main{
width:100%;
max-width:420px;
padding-bottom:120px;
}

.header{
text-align:center;
margin-top:20px;
}

.brand{
font-size:34px;
font-weight:700;
color:#00ff9c;
}

.sub{
font-size:13px;
opacity:0.6;
color:#00ff9c;
}

.wrapper{
margin-top:20px;
display:flex;
justify-content:center;
}

.spi-value{
font-size:46px;
font-weight:600;
fill:white;
}

.spi-label{
font-size:12px;
fill:#cfd6dc;
letter-spacing:1px;
}

.tiles{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:20px;
padding:0 12px;
}

.tile{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:14px; }

.tile-title{
font-size:12px;
opacity:0.7;
display:flex;
align-items:center;
gap:8px;
}

.tile-value{
font-size:18px;
font-weight:500;
margin-top:4px;
}

.icon{
width:20px;
height:20px;
fill:white;
}

.ai-box{
margin:20px 12px;
background:rgba(255,255,255,0.06);
border-left:4px solid #00ff9c;
border-radius:16px;
padding:16px;
cursor:pointer;
}

.ai-title{
font-size:12px;
opacity:0.6;
}

.ai-head{
font-size:20px;
font-weight:600;
margin-top:6px;
}

.ai-text{
margin-top:8px;
font-size:14px;
line-height:1.5em;
display:none;
}

.dock{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:#000;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.dock-btn{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
color:white;
}

.dock-icon{
width:26px;
height:26px;
margin-bottom:4px;
fill:white;
}

</style>
</head>


<body>

<div class="main">

<div class="header">
<div class="brand">AIF™</div>
<div class="sub">Artificial Intelligence Fishing</div> <div class="sub">See what lies below</div> </div>


<div class="wrapper">

<svg viewBox="0 0 300 300" width="260">

<defs>
<linearGradient id="gradFull">
<stop offset="0%" stop-color="#ff3b3b"/> <stop offset="40%" stop-color="#ffc400"/> <stop offset="100%" stop-color="#00ff9c"/> </linearGradient> </defs>

<circle cx="150" cy="150" r="120"
fill="none"
stroke="url(#gradFull)"
stroke-width="4"/>

<g id="ticks"></g>

<circle cx="150" cy="150" r="102"
fill="none"
stroke="url(#gradFull)"
stroke-width="3"
stroke-linecap="round"
stroke-dasharray="640"
stroke-dashoffset="640"
transform="rotate(-90 150 150)"
id="progressArc"/>

<circle cx="150" cy="150" r="80" fill="#0b1117"/>

<text x="150" y="145" text-anchor="middle" class="spi-value" id="spiText">--%</text> <text x="150" y="170" text-anchor="middle" class="spi-label">SPI LEVEL</text>

</svg>

</div>


<div class="tiles">

<div class="tile">
<div class="tile-title">
🌡 Air Temp
</div>
<div class="tile-value" id="airTemp"></div> </div>

<div class="tile">
<div class="tile-title">
Surface (0-3m)
</div>
<div class="tile-value" id="surfaceTemp"></div> </div>

<div class="tile">
<div class="tile-title">
Bottom Temp
</div>
<div class="tile-value" id="bottomTemp"></div> </div>

<div class="tile">
<div class="tile-title">
Pressure
</div>
<div class="tile-value" id="pressure"></div> </div>

<div class="tile">
<div class="tile-title">
Wind
</div>
<div class="tile-value" id="wind"></div> </div>

<div class="tile">
<div class="tile-title">
Cloud
</div>
<div class="tile-value" id="cloud"></div> </div>

<div class="tile">
<div class="tile-title">
Moon
</div>
<div class="tile-value" id="moon"></div> </div>

</div>


<div class="ai-box" onclick="toggleAI()">

<div class="ai-title">AI Tactical Command</div>

<div class="ai-head" id="aiTitle"></div>

<div class="ai-text" id="aiText"></div>

</div>

</div>


<div class="dock">

<div class="dock-btn" onclick="gps()">
📍
GPS
</div>

<div class="dock-btn" onclick="updateData()">
🎣
Refresh
</div>

<div class="dock-btn" onclick="drop()">
🎯
New Drop
</div>

</div>



<script>


const ticks=document.getElementById("ticks");

for(let i=0;i<100;i++){

const angle=(i/100)*360;
const rad=(angle-90)*Math.PI/180;

const outer=112;
const inner=i%10===0?105:108;
const width=i%10===0?1.5:0.8;

const x1=150+outer*Math.cos(rad);
const y1=150+outer*Math.sin(rad);

const x2=150+inner*Math.cos(rad);
const y2=150+inner*Math.sin(rad);

const line=document.createElementNS("http://www.w3.org/2000/svg","line");

line.setAttribute("x1",x1);
line.setAttribute("y1",y1);
line.setAttribute("x2",x2);
line.setAttribute("y2",y2);

line.setAttribute("stroke","#fff");
line.setAttribute("stroke-width",width);

ticks.appendChild(line);

}



function fetchData(){

return{

airTemp:18+Math.random()*5,
surfaceTemp:19+Math.random()*4,
bottomTemp:16+Math.random()*3,
pressure:1012+Math.random()*5,
windSpeed:5+Math.random()*12,
windDir:["N","NE","E","SE","S","SW","W","NW"][Math.floor(Math.random()*8)],
cloud:Math.floor(Math.random()*100),
moon:["New","Waxing","Full","Waning"][Math.floor(Math.random()*4)]

};

}



function calculateSPI(d){

let score=50;

if(d.pressure>1015)score+=15;

if(d.windSpeed>=3 && d.windSpeed<=12)score+=15;

if(d.cloud>50)score+=10;

if(d.moon==="Full")score+=10;

return Math.min(100,Math.round(score));

}



function render(d){

document.getElementById("airTemp").innerText=d.airTemp.toFixed(1)+" °C";

document.getElementById("surfaceTemp").innerText=d.surfaceTemp.toFixed(1)+" °C";

document.getElementById("bottomTemp").innerText=d.bottomTemp.toFixed(1)+" °C";

document.getElementById("pressure").innerText=d.pressure.toFixed(0)+" hPa";

document.getElementById("wind").innerText=d.windSpeed.toFixed(1)+" km/h "+d.windDir;

document.getElementById("cloud").innerText=d.cloud+"%";

document.getElementById("moon").innerText=d.moon;



const spi=calculateSPI(d);

const radius=102;

const circumference=2*Math.PI*radius;

document.getElementById("progressArc").style.strokeDashoffset=

circumference-(spi/100)*circumference;



document.getElementById("spiText").textContent = spi +"%";



if(spi>75){

document.getElementById("aiTitle").innerText="High Probability Window";

document.getElementById("aiText").innerText="Environmental alignment strong. Target drop-offs between 3-5m. Windward banks may hold feeding fish.";

}

else if(spi>55){

document.getElementById("aiTitle").innerText="Moderate Activity";

document.getElementById("aiText").innerText="Conditions partially aligned. Monitor pressure trend and maintain steady baiting.";

}

else{

document.getElementById("aiTitle").innerText="Low Activity";

document.getElementById("aiText").innerText="Fish activity likely reduced. Consider repositioning or lighter feeding.";

}

}



function updateData(){

render(fetchData());

}



function toggleAI(){

let box=document.getElementById("aiText");

box.style.display=box.style.display==="block"?"none":"block";

}



function gps(){

navigator.geolocation.getCurrentPosition(

pos=>alert("GPS: "+pos.coords.latitude+","+pos.coords.longitude)

);

}



function drop(){

alert("New drop recorded");

}



render(fetchData());

</script>


</body>
</html>
